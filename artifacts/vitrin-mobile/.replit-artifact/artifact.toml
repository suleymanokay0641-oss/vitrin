kind = "mobile"
previewPath = "/mobile/"
title = "Vitrin Mobil"
version = "1.0.0"
id = "artifacts/vitrin-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 21736
name = "expo"
paths = ["/mobile/"]

[services.development]
run = "pnpm --filter @workspace/vitrin-mobile run dev"

[services.env]
PORT = "21736"
BASE_PATH = "/mobile/"

[services.production]
build = ["pnpm", "--filter", "@workspace/vitrin-mobile", "run", "build"]
run = ["pnpm", "--filter", "@workspace/vitrin-mobile", "run", "serve"]
