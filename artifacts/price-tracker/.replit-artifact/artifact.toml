kind = "web"
previewPath = "/"
title = "Fiyat Dedektifi"
version = "1.0.0"
id = "artifacts/price-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24503
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/price-tracker run dev"

[services.env]
PORT = "24503"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/price-tracker", "run", "build"]
publicDir = "artifacts/price-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
